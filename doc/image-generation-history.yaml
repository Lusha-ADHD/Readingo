      soft_matte: true
      transparent_threshold: 12
      opaque_threshold: 220
      despill: true
      resize: [768, 768]
    outputs:
      - path: public/assets/images/fr/words/chaton.png
        dimensions: [768, 768]
        format: PNG-RGBA
        role: selected_output
    validation: &passed_validation
      visual: passed
      transparent_corners: passed

