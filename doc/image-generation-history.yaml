schema_version: 1
archive_policy: append-only
description: >-
  Historique des generations et derivations d'assets images. Chaque nouvelle
  tentative doit ajouter une entree, meme si elle remplace une version
  precedente. Le champ status indique selected, superseded ou rejected.

entries:
  - id: 2026-07-22-fishing-boat-v1
    date: 2026-07-22
    status: selected
    operation: generate
    recipe: readingo-pana-v1
    tool:
      provider: OpenAI
      interface: Codex built-in image_gen
      model: not_exposed
      seed: not_exposed
    inputs:
      - index: 1
        path: public/assets/characters/pana.png
        role: primary_style_reference
      - index: 2
        path: public/assets/world/boat.png
        role: secondary_visual_language_reference
    prompt: |-
      Use case: stylized-concept
      Asset type: square 2D game icon for a children's educational adventure game
      Input images: Image 1 is the primary style reference (Pana character icon); Image 2 is an additional visual-language reference (existing boat icon). Use them only to match the established rendering language, not to copy their subject or pirate symbols.
      Primary request: Create one charming small fishing boat icon.
      Subject: A compact traditional wooden fishing boat in three-quarter side view, with a small turquoise wheelhouse, warm orange-brown hull, cream trim, tiny mast, coiled rope, two simple fishing crates and one visible fishing net. No people, no animal, no pirate flag, no skull, no weapons.
      Style/medium: polished cute 2D children's game asset; chunky rounded silhouette; dark warm-brown outline; smooth vector-like shapes; subtle soft 3D shading and glossy highlights; friendly toy-like proportions; detail level matching the Pana icon.
      Composition/framing: one complete boat centered, fully visible, generous even padding, readable at small icon size, no water and no ground.
      Color palette: warm orange, coral red, cream, turquoise blue, restrained golden accents.
      Scene/backdrop: perfectly flat solid #00ff00 chroma-key background for removal.
      Constraints: background must be exactly one uniform color with no shadow, gradient, texture, horizon, floor, reflection, or lighting variation. Keep crisp clean edges. Do not use #00ff00 anywhere on the boat.
      Avoid: text, letters, numbers, watermark, border, frame, cast shadow, contact shadow, photorealism, extra objects, cropped parts.
    generated_dimensions: [1254, 1254]
    post_processing:
      chroma_key: auto-border
      soft_matte: true
      transparent_threshold: 12
      opaque_threshold: 220
      despill: true
    outputs:
      - path: public/assets/world/fishing-boat.png
        dimensions: [1254, 1254]
        format: PNG-RGBA
        role: generated_master
      - path: public/assets/images/fr/words/bateau.png
        dimensions: [768, 768]
        format: PNG-RGBA
        role: resized_derivative
    validation:
      visual: passed
      transparent_corners: passed

